#spring.application.name=mycarshop
#spring.profiles.include=aws

# \uB85C\uCEEC \uAC1C\uBC1C: test / EC2 \uBC30\uD3EC: start.sh \uC5D0\uC11C -Dspring.profiles.active=aws
spring.profiles.active=test

server.port=8080
server.tomcat.connection-timeout=2s
server.tomcat.keep-alive-timeout=15s
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# jpa (profile\uBCC4 \uB36E\uC5B4\uC500: test=update, aws=Secret)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Config Server \u2014 optional \uC774\uBA74 URI \uC5C6\uC744 \uB54C \uC5F0\uACB0 \uC2DC\uB3C4\u00B7\uAE30\uB3D9 \uCC28\uB2E8 \uC5C6\uC74C (spring-cloud-config \uD544\uC218)
spring.config.import=optional:configserver:
#spring.cloud.config.uri=http://config-service:8888
#spring.application.name=mycarshop
#spring.cloud.config.request-connect-timeout=1000
#spring.cloud.config.request-read-timeout=2000
#spring.cloud.config.retry.max-attempts=1

#Redis Repository \uC790\uB3D9 \uC124\uC815 \uB044\uAE30 \u2014 Redis\uB294 \uCE90\uC2DC\uB9CC \uC0AC\uC6A9
spring.data.redis.repositories.enabled=false

#HttpSession (JSESSIONID) \u2014 \uB85C\uADF8\uC778 \uC138\uC158 \uC720\uD734 \uC2DC\uAC04(\uC11C\uBC84 \uC138\uC158)
server.servlet.session.timeout=1m

#Actuator \u2014 Redis \uC5F0\uB3D9 \uC0C1\uD0DC \uD655\uC778 (/actuator/health)
#http\uB97C \uD1B5\uD574 /actuator/refresh, /actuator/health \uB178\uCD9C
management.endpoints.web.exposure.include=health,refresh
#\uC778\uC99D\uB41C \uC0AC\uC6A9\uC790\uC5D0\uAC8C\uB9CC health \uC0C1\uC138(JSON components) \uB97C \uBCF4\uC5EC \uC8FC\uB294 \uC124\uC815
management.endpoint.health.show-details=when_authorized
