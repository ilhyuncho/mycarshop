#spring.application.name=mycarshop
#spring.profiles.include=aws

# \uB85C\uCEEC \uAC1C\uBC1C: test / EC2 \uBC30\uD3EC: start.sh \uC5D0\uC11C -Dspring.profiles.active=aws
spring.profiles.active=test

server.port=8080
server.tomcat.connection-timeout=2s
server.tomcat.keep-alive-timeout=15s
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# jpa (profile\uBCC4 \uB36E\uC5B4\uC500: test=update, aws=Secret)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Config Server \u2014 optional \uC774\uBA74 URI \uC5C6\uC744 \uB54C \uC5F0\uACB0 \uC2DC\uB3C4\u00B7\uAE30\uB3D9 \uCC28\uB2E8 \uC5C6\uC74C (spring-cloud-config \uD544\uC218)
spring.config.import=optional:configserver:
