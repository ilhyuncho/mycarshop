server.port=8080

spring.config.import=optional:configserver:

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/project2db
spring.datasource.username=webuser
spring.datasource.password=abcd1234

spring.jpa.hibernate.ddl-auto=update
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# file upload (CI/Linux·로컬 공통)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=${java.io.tmpdir}/mycarshop-file_repo
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=10MB
com.cih.upload.path=${java.io.tmpdir}/mycarshop-file_repo
