name: Commit Stage
on: push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ilhyuncho/mycarshop
  VERSION: latest
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: mycarshop2-deploy
  CODE_DEPLOY_APPLICATION_NAME: mycarshop_deploy
  CODE_DEPLOY_DEPLOYMENT_GROUP_NAME: mycarshop_deployment_group

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Setup MariaDB
        uses: YakkaDev/mariadb-actions@v1.1.0
        with:
          version: '10.6.15'
          character: 'utf8mb4'
          database: 'project2db'
          user: 'webuser'
          password: 'abcd1234'
      - name: Code vulnerability scanning
        uses: anchore/scan-action@v6
        id: scan
        with:
          path: "${{ github.workspace }}"
          fail-build: false
          severity-cutoff: high
      - name: Upload vulnerability report
        if: (success() || failure()) && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
      - name: Build, unit tests and integration tests
        run: |
          chmod +x gradlew
          ./gradlew build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Create application-aws.properties from Secret
        run: echo "${{ secrets.AWS_RDS_INFO }}" > ./src/main/resources/application-aws.properties
      - name: Build JAR (skip tests)
        run: ./gradlew clean build -x test
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Make deploy scripts executable
        run: chmod +x scripts/start.sh scripts/stop.sh
      - name: Upload to AWS S3
        run: |
          aws deploy push \
            --application-name ${{ env.CODE_DEPLOY_APPLICATION_NAME }} \
            --ignore-hidden-files \
            --s3-location s3://$S3_BUCKET_NAME/$GITHUB_SHA.zip \
            --source .
      - name: Deploy to AWS EC2 from S3
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.CODE_DEPLOY_APPLICATION_NAME }} \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --deployment-group-name ${{ env.CODE_DEPLOY_DEPLOYMENT_GROUP_NAME }} \
            --s3-location bucket=$S3_BUCKET_NAME,key=$GITHUB_SHA.zip,bundleType=zip
